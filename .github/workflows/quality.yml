name: Quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: ruff check .
      - run: mypy services.py
      - run: bandit -q -r core.py services.py -c pyproject.toml
      - run: pytest
