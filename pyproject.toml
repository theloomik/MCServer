[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = false
warn_unused_ignores = true

[tool.bandit]
exclude_dirs = ["tests", "minecraft_servers", "dist"]

[[tool.mypy.overrides]]
# PySide6 stubs mis-type most enum members as missing; suppress attr-defined/call-overload
# for all modules that directly import from PySide6.
module = ["styles", "widgets", "ui", "pages.*"]
disable_error_code = ["attr-defined", "call-overload", "assignment", "union-attr", "index", "var-annotated", "has-type"]
